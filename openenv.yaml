name: code-review-env
version: "1.0.0"
description: >
  A real-world OpenEnv environment where an AI agent reviews code
  snippets, identifies bugs, classifies severity, and suggests fixes.
  Partial credit is awarded for partially correct reviews.

observation_space:
  type: object
  fields:
    - name: snippets
      type: list[CodeSnippet]
      description: Python and JavaScript code snippets to review
    - name: step_number
      type: integer
      description: Current step in the episode
    - name: total_snippets
      type: integer
      description: Total number of snippets in this task
    - name: task_name
      type: string
      description: Name of the current task
    - name: session_id
      type: string|null
      description: Session identifier returned by /reset and reused for /step and /state

action_space:
  type: object
  fields:
    - name: reports
      type: list[BugReport]
      description: One bug report per snippet
    - name: bug_type
      type: enum
      values:
        - off_by_one
        - wrong_variable
        - missing_return
        - mutable_default_arg
        - wrong_logic
        - missing_edge_case
        - incorrect_exception_handling
        - hardcoded_secret
        - no_bug
    - name: severity
      type: enum
      values: [low, medium, high]
    - name: suggested_fix
      type: string
      description: Corrected line(s) of code

tasks:
  - name: easy
    description: 3 production-style review snippets with one obvious bug each
    difficulty: easy
    num_snippets: 3
    expected_score_range: [0.7, 1.0]

  - name: medium
    description: 3 production-style snippets with subtle bugs including retries, cache state, and webhook parsing
    difficulty: medium
    num_snippets: 3
    expected_score_range: [0.4, 0.8]

  - name: hard
    description: 8 advanced snippets across Python and JavaScript, including auth flows, audit events, async bugs, and no-bug traps
    difficulty: hard
    num_snippets: 8
    expected_score_range: [0.2, 0.7]

  - name: security
    description: 4 snippets with security vulnerabilities — SQL injection, hardcoded secrets, path traversal
    difficulty: hard
    num_snippets: 4
    expected_score_range: [0.5, 0.9]

reward:
  range: [0.0, 1.0]
  partial_credit: true
  scoring_rules:
    - correct bug_type + correct severity + good fix = 1.0
    - correct bug_type + correct severity + weak fix = 0.8
    - correct bug_type + wrong severity + good fix = 0.7
    - correct bug_type + wrong severity + weak fix = 0.5
    - wrong bug_type = 0.2
    - missed snippet = 0.0

api:
  endpoints:
    - POST /reset
    - POST /step
    - GET /state
    - GET /tasks
    - GET /

environment_variables:
  - name: API_BASE_URL
    description: The API endpoint for the LLM
  - name: MODEL_NAME
    description: The model identifier to use for inference
  - name: HF_TOKEN
    description: Your Hugging Face / API key
runtime:
  framework: fastapi
  port: 7860
app:
  entrypoint: app:app