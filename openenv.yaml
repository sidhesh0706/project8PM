name: it-helpdesk-ops-env
version: "2.0.0"
description: >
  A real-world OpenEnv environment where an AI agent works as an enterprise IT
  helpdesk and security operations analyst. The agent must investigate tickets,
  gather evidence, check policy, and choose a safe final action such as unlock,
  provision, deny, revoke, or escalate.

observation_space:
  type: object
  fields:
    - name: tickets
      type: list[TicketItem]
      description: The currently active ticket, including visible context, discovered facts, and prior actions.
    - name: step_number
      type: integer
      description: Global step count in the episode.
    - name: current_case_step
      type: integer
      description: Step count within the active case.
    - name: total_tickets
      type: integer
      description: Total number of tickets in the selected task.
    - name: task_name
      type: string
      description: Name of the active task tier.
    - name: session_id
      type: string|null
      description: Session identifier returned by /reset and reused for /step and /state.

action_space:
  type: object
  fields:
    - name: operations
      type: list[ResolutionOperation]
      description: One or more operations, though the environment executes the first operation for the active ticket.
    - name: case_id
      type: string
      description: Ticket identifier for the active case.
    - name: action_type
      type: enum
      values:
        - lookup_user
        - lookup_device
        - search_kb
        - check_access_policy
        - review_login_risk
        - reset_password
        - unlock_account
        - issue_vpn_profile
        - grant_app_access
        - assign_license
        - revoke_access
        - deny_request
        - escalate_security
        - escalate_it_ops
        - close_as_no_issue
    - name: target
      type: string
      description: Resource or queue targeted by the operation.
    - name: note
      type: string
      description: Internal reasoning or analyst note for the action.
    - name: customer_message
      type: string
      description: User-facing explanation of the action taken.

tasks:
  - name: easy
    description: Routine support tasks such as password resets, lockouts, VPN restoration, and approved SaaS access.
    difficulty: easy
    num_cases: 5
    expected_score_range: [0.7, 1.0]

  - name: medium
    description: Policy-aware operations cases requiring roster checks, travel-risk interpretation, and controlled escalation.
    difficulty: medium
    num_cases: 5
    expected_score_range: [0.5, 0.9]

  - name: hard
    description: High-stakes operational scenarios covering offboarding drift, probable compromise, unmanaged devices, and production access.
    difficulty: hard
    num_cases: 7
    expected_score_range: [0.4, 0.8]

  - name: security
    description: Security-heavy cases involving MFA fatigue, leaked credentials, phishing, terminated access, and unsafe data handling.
    difficulty: hard
    num_cases: 6
    expected_score_range: [0.5, 0.9]

reward:
  range: [0.0, 1.0]
  partial_credit: true
  scoring_rules:
    - evidence gathering receives partial credit when the action reveals relevant facts.
    - repeated or irrelevant investigations receive little to no credit.
    - correct final resolution with good evidence coverage and clear communication scores highest.
    - unsafe or policy-violating final actions score poorly.

api:
  endpoints:
    - POST /reset
    - POST /step
    - GET /state
    - GET /tasks
    - GET /report
    - GET /sessions/summary
    - GET /manifest
    - GET /health
    - GET /web
    - GET /

environment_variables:
  - name: API_BASE_URL
    description: The API endpoint for the LLM proxy.
  - name: MODEL_NAME
    description: The model identifier to use for inference.
  - name: API_KEY
    description: The injected proxy/API key used by the OpenAI client.
  - name: HF_TOKEN
    description: Optional local fallback credential accepted by the baseline.
  - name: LOCAL_IMAGE_NAME
    description: Optional local image name when using docker-image based execution.

runtime:
  framework: fastapi
  port: 7860

app:
  entrypoint: app:app
